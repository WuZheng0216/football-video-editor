name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install FFmpeg
      run: |
        choco install ffmpeg -y
        
    - name: Install dependencies
      run: |
        cd electron-app
        npm ci
        
    - name: Install Python dependencies
      run: |
        cd ai-engine
        pip install -r requirements.txt
        
    - name: Build Windows application
      run: |
        cd electron-app
        npm run build
        npm run package -- --win
        
    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v3
      with:
        name: football-editor-windows
        path: electron-app/dist/*.exe
        
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        
    - name: Install dependencies
      run: |
        cd electron-app
        npm ci
        
    - name: Install Python dependencies
      run: |
        cd ai-engine
        pip install -r requirements.txt
        
    - name: Build Linux application
      run: |
        cd electron-app
        npm run build
        npm run package -- --linux
        
    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v3
      with:
        name: football-editor-linux
        path: electron-app/dist/*.AppImage
        
  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install FFmpeg
      run: |
        brew install ffmpeg
        
    - name: Install dependencies
      run: |
        cd electron-app
        npm ci
        
    - name: Install Python dependencies
      run: |
        cd ai-engine
        pip install -r requirements.txt
        
    - name: Build macOS application
      run: |
        cd electron-app
        npm run build
        npm run package -- --mac
        
    - name: Upload macOS artifacts
      uses: actions/upload-artifact@v3
      with:
        name: football-editor-macos
        path: electron-app/dist/*.dmg
        
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      
    - name: Display structure of downloaded files
      run: ls -R
      
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          football-editor-windows/*.exe
          football-editor-linux/*.AppImage
          football-editor-macos/*.dmg
        draft: false
        prerelease: false
        generate_release_notes: true
        
  train-model:
    runs-on: ubuntu-latest-gpu
    
    strategy:
      matrix:
        python-version: [3.10]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install CUDA dependencies
      run: |
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cu118
        
    - name: Install AI dependencies
      run: |
        cd ai-engine
        pip install -r requirements.txt
        
    - name: Test AI models
      run: |
        cd ai-engine
        python test_detection.py
        
    - name: Upload model test results
      uses: actions/upload-artifact@v3
      with:
        name: ai-test-results
        path: ai-engine/detection_result.jpg